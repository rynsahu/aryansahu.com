<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Orange rounded background -->
  <rect width="32" height="32" rx="6" ry="6" fill="#FF7E00"/>
  <!-- Inner gradient for depth -->
  <rect width="32" height="32" rx="6" ry="6" fill="url(#grad)"/>
  <!-- White window frame -->
  <rect x="7" y="9" width="18" height="14" rx="2.5" ry="2.5" fill="white" opacity="0.95" filter="url(#shadow)"/>
  <!-- Two orange dots (window controls) -->
  <circle cx="11" cy="13" r="1.2" fill="#FF7E00"/>
  <circle cx="14.5" cy="13" r="1.2" fill="#FF7E00"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
</svg>
